<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision-Structures</title>
</head>
<body>
   <!DOCTYPE html>
<html>
<body>
    <h1>Verificador de Idade</h1>
    <script>
        // O prompt sempre retorna uma string, então usamos Number() para converter
        const idade = Number(prompt("Qual a sua idade?"));

        if (idade < 0 || idade > 120) {
            alert("Idade inválida.");
        } else if (idade < 13) {
            alert("Você é criança.");
        } else if (idade < 18) {
            alert("Você é adolescente.");
        } else if (idade < 60) {
            alert("Você é adulto.");
        } else {
            alert("Você é idoso.");
        }

    </script>
</body>
</html>
</body>
</html>
