<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repeat Loops</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<body>
    <h1>Laços de Repetição</h1>
    <script>
        document.write("<h3>Loop FOR (1 a 10)</h3>");
        for (let i = 1; i <= 10; i++) {
            document.write(i + " ");
        }

        document.write("<h3>Loop FOR (Pares 2 a 20)</h3>");
        for (let i = 2; i <= 20; i += 2) {
            document.write(i + " ");
        }

        document.write("<h3>Loop WHILE (Senha)</h3>");
        let senha;
        do {
            senha = prompt("Digite a senha (1234):");
        } while (senha !== "1234");
        alert("Senha correta!");
    </script>
</body>
</html>
</body>
</html>
