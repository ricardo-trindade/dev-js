<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables and Operators</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<body>
    <script>
        const nome = "Ricardo";
        const profissao = "Estudante";
        const cidade = "São Paulo";
        const num1 = 10;
        const num2 = 5;

        // Exibindo na tela do navegador
        document.write(`<h3>${nome}, ${profissao} de ${cidade}</h3>`);
        document.write(`<p>Soma: ${num1 + num2} | Subtração: ${num1 - num2}</p>`);
        document.write(`<p>Multiplicação: ${num1 * num2} | Divisão: ${num1 / num2}</p>`);
        document.write(`<p>Frase: O resultado da soma de ${num1} + ${num2} é ${num1 + num2}.</p>`);
    </script>
</body>
</html>
</body>
</html>
